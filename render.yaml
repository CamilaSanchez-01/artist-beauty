# Configuración de despliegue para Render
# Render lee este archivo automáticamente
services:
  - type: web
    name: artist-beauty
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn artist_beauty.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: artist-beauty-db
          property: connectionString

databases:
  - name: artist-beauty-db
    plan: free
    databaseName: artist_beauty
    user: artist_beauty
